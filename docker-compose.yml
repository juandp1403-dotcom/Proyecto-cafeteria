services:
  web:
    build: .
    expose:
      - "5545"
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres-db:
        condition: service_healthy

  postgres-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: cafeteria
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cafeteria"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
