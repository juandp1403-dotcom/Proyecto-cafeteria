<div class="mb-3">
  <label class="form-label fw-semibold">Nombre del producto</label>
  <input type="text" class="form-control" name="nombre" placeholder="Ej: Almuerzo Completo" required>
</div>
<div class="row g-3 mb-3">
  <div class="col">
    <label class="form-label fw-semibold">Precio ($)</label>
    <input type="number" class="form-control" name="precio" min="0" placeholder="8000" required>
  </div>
  <div class="col">
    <label class="form-label fw-semibold">Stock</label>
    <input type="number" class="form-control" name="stock" min="0" placeholder="50" required>
  </div>
</div>
